<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TMP Transcription Progress</title>
<link rel="stylesheet" href="style.css">
<style>
  body { max-width: 720px; margin: 40px auto; padding: 0 16px; font-family: var(--font-ui); color: var(--ink); background: var(--bg); }
  h1 { font-family: var(--font-display); color: var(--lime); font-size: 1.4rem; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .row { display: flex; justify-content: space-between; margin: 4px 0; color: var(--ink-mute); }
  .row b { color: var(--ink); font-weight: normal; }
  .bar { height: 10px; background: var(--surface-2); border-radius: var(--radius); overflow: hidden; margin: 8px 0; }
  .bar > div { height: 100%; background: var(--lime); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  td { padding: 3px 6px; border-bottom: 1px solid var(--line); color: var(--ink-mute); }
  td.ep { color: var(--lime); font-family: var(--font-mono); }
  .fail { color: var(--hot); }
  #stamp { color: var(--ink-mute); font-size: 0.75rem; }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }
</style>
</head>
<body>
<h1>TMP Transcription — Live Progress</h1>
<div id="app"><p>loading…</p></div>
<p id="stamp"></p>

<script>
async function tick() {
  let d;
  try {
    d = await (await fetch('progress.json?_=' + Date.now())).json();
  } catch (e) {
    document.getElementById('app').innerHTML = '<p class="fail">no progress data yet</p>';
    return;
  }
  const app = document.getElementById('app');
  if (d.status === 'not_started') {
    app.innerHTML = '<p>batch not started yet</p>';
    return;
  }
  const pct = d.batch_total ? Math.round(100 * d.n_done_in_batch / d.batch_total) : 0;
  const eta = d.eta_s ? new Date(d.eta_s * 1000).toISOString().substr(11, 8) : '—';
  let html = `<div class="card">
    <div class="row"><span>batch</span><b>${d.batch_range || ''} (${d.model || ''})</b></div>
    <div class="row"><span>progress</span><b>${d.n_done_in_batch}/${d.batch_total} (${pct}%)</b></div>
    <div class="bar"><div style="width:${pct}%"></div></div>
    <div class="row"><span>current</span><b class="${d.current ? 'pulse' : ''}">${
      d.current ? `ep ${d.current.idx}/${d.current.of} — ${d.current.state}` : 'idle'
    }</b></div>
    <div class="row"><span>avg time/episode</span><b>${d.avg_episode_s ? d.avg_episode_s + 's' : '—'}</b></div>
    <div class="row"><span>ETA remaining</span><b>${eta}</b></div>
    <div class="row"><span>failed</span><b class="${d.failed && d.failed.length ? 'fail' : ''}">${d.failed ? d.failed.length : 0}</b></div>
  </div>`;

  if (d.completed && d.completed.length) {
    html += '<div class="card"><table>';
    for (const c of [...d.completed].reverse()) {
      html += `<tr><td class="ep">ep ${String(c.ep).padStart(3,'0')}</td><td>${c.title}</td><td>${(c.whisper_s+c.speaker_s).toFixed(1)}s</td></tr>`;
    }
    html += '</table></div>';
  }
  app.innerHTML = html;
  document.getElementById('stamp').textContent = 'updated ' + (d.updated || '') + ' — refreshes every 45s';
}
tick();
setInterval(tick, 45000);
</script>
</body>
</html>
